
#################################
#          Animations           #
#################################
# fly-in: Windows fly in from random directions to the screen
# maximize: Windows pop from center of the screen to their respective positions
# minimize: Windows minimize from their position to the center of the screen
# slide-in-center: Windows move from upper-center of the screen to their respective positions
# slide-out-center: Windows move to the upper-center of the screen
# slide-left: Windows are created from the right-most window position and slide leftwards
# slide right: Windows are created from the left-most window position and slide rightwards
# slide-down: Windows are moved from the top of the screen and slide downward
# slide-up: Windows are moved from their position to top of the screen
# squeeze: Windows are either closed or created to/from their center y-position (the animation is similar to a blinking eye)
# squeeze-bottom: Similar to squeeze, but the animation starts from bottom-most y-position
# zoom: Windows are either created or destroyed from/to their center (not the screen center)

animations = true;
animation-clamping = false;
animation-for-open-window = "slide-down";
animation-for-unmap-window = "zoom";
animation-for-transient-window = "none";
animation-for-tag-change = "slide-left";

animation-stiffness-in-tag = 180;
animation-dampening = 22;
animation-window-mass = 0.8;
animation-clamping = true;
animation-stiffness-tag-change = 90;

#========================= Corners =========================#
corner-radius = 5;
round-borders = 2;
rounded-corners-exclude = [
    "window_type = 'desktop'",
    "window_type = 'root'",
];

#========================= Shadows =========================#
shadow = false;
shadow-radius = 5;
shadow-offset-x = -5;
shadow-offset-y = -6;
shadow-opacity = .4;

shadow-exclude = [
    "class_g = 'slop'",
    "window_type = 'menu'",
    "window_type = 'desktop'",
    "class_g = 'Firefox' && window_type *= 'utility'",
    "class_g = 'Firefox' && argb",
	  "class_g = 'Ulauncher'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "name = 'cpt_frame_window'"
];

#========================= Fading =========================#
fading = true;
fade-in-step = 0.5;
fade-out-step = 0.1;
fade-delta = 20;

no-fading-openclose = false
no-fading-destroyed-argb = true

fade-exclude = [
  "class_g = 'slop'"
]

#========================= Blurring =========================#
blur: {
	method = "dual_kawase";
  strength = 1;
	deviation = 1.0;
	kernel = "11x11gaussian";
  background = false;
  background-frame = true;
  background-fixed = true;
}

blur-background-exclude = [
	"class_g = 'slop'",
	"class_g = 'Firefox' && argb",
	"class_g = 'firefox'",
	"class_g = 'Ulauncher'",
  "window_type = 'dock'",
  "class_g = 'zoom'",
  "class_g = 'Zoom'",
	"_GTK_FRAME_EXTENTS@:c",
];

#========================= Transparency =============================#
opacity-rule = [
    "85:class_g = 'Zathura'"
];
#========================= General Settings =========================#
backend = "glx";
vsync = true;
daemon = true;
dbus = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-client-leader = true;
detect-transient = true;
transparent-clipping = false;

wintypes: {
    tooltip = { fade = true; full-shadow = false; focus = true; };
    menu = { full-shadow = true;};
    popup_menu =  { full-shadow = true;};
    utility =  {full-shadow = true;};
    toolbar = {full-shadow = true;};
    normal = {shadow = true;};
    notification = {
      fade = true;
      full-shadow = true;
    };
    dialog = {full-shadow = true};
    dock = {
      full-shadow = true;
      animation = "slide-left";
    };
    dropdown_menu = { full-shadow = true;};
    utility = {animation = "slide-down";};
    splash = {animation = "squeeze";};
};

animations = (
    {
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.1;  # Slightly longer duration for smoother opacity fade
            start = "window-raw-opacity-before";
            end = 0;
        };
        shadow-opacity = "opacity";
        scale-x = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.3;  # Smoother zoom-out
            start = 1;  # Start at full size
            end = 0;  # Zoom out to 0
        };
        scale-y = "scale-x";
        shadow-scale-x = "scale-x";
        shadow-scale-y = "scale-y";

        # Adjust offsets to zoom from the center
        offset-x = "(1 - scale-x) / 2 * window-width";
        offset-y = "(1 - scale-y) / 2 * window-height";
        shadow-offset-x = "offset-x";
        shadow-offset-y = "offset-y";

        # Add blur effect during close
        blur = {
            curve = "linear";
            duration = 0.2;  # Smooth blur fade
            start = 0;
            end = 10;  # Max blur (you can adjust this value for stronger/weaker blur)
        };
    },
    {
        triggers = ["open", "show"];
        opacity = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Smoother fade-in with longer duration
            start = 0;
            end = "window-raw-opacity";
        };
        offset-x = "(1 - scale-x) / 2 * window-width";  # Start from center
        offset-y = "(1 - scale-y) / 2 * window-height";  # Start from center
        scale-x = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Slower zoom-in for smooth effect
            start = 0;  # Start very small
            end = 1;  # Zoom in to full size
        };
        scale-y = "scale-x";
        shadow-scale-x = "scale-x";
        shadow-scale-y = "scale-y";
        shadow-offset-x = "offset-x";
        shadow-offset-y = "offset-y";
    },
    {
        triggers = ["geometry"];
        scale-x = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Smoother scaling
            start = "window-width-before / window-width";
            end = 1;
        };
        scale-y = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Smoother scaling
            start = "window-height-before / window-height";
            end = 1;
        };
        offset-x = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Smoother positioning
            start = "window-x-before - window-x";
            end = 0;
        };
        offset-y = {
            curve = "cubic-bezier(0.25,0.8,0.25,1)";  # Smooth easing curve
            duration = 0.2;  # Smoother positioning
            start = "window-y-before - window-y";
            end = 0;
        };
        shadow-scale-x = "scale-x";
        shadow-scale-y = "scale-y";
        shadow-offset-x = "offset-x";
        shadow-offset-y = "offset-y";
    }
)

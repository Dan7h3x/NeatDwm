# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=4
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
cursor_hide_timeout=5
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
cursor_theme=Bibata-Modern-Ice
drag_tile_to_tile=1
drag_tile_small=1
xwayland_presistence=1
# keyboard
repeat_rate=25
repeat_delay=300
numlockon=0
xkb_rules_layout=us,ir
xkb_rules_options=grp:alt_shift_toggle

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=3
gappiv=3
gappoh=3
gappov=3
scratchpad_width_ratio=0.6
scratchpad_height_ratio=0.6
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff





# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=ALT,r,reload_config

# menu and terminal
bind=SUPER,R,spawn,launcher
bind=SUPER,Return,spawn,foot
bind=SUPER+SHIFT,Return,spawn,foot -a floating
bind=Alt,Return,spawn,kitty
bind=Alt,p,spawn,pdfmenu
bind=Alt,y,spawn,pdftabs
bind=Alt,o,spawn,mpvradio
# exit
bind=SUPER,x,spawn,powermenu
bind=SUPER,c,killclient

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER,Up,exchange_client,up
bind=SUPER,Down,exchange_client,down
bind=SUPER,Left,exchange_client,left
bind=SUPER,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,space,togglefloating,
bind=SUPER,m,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
# bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,o,toggleoverlay,
bind=SUPER,i,toggle_scratchpad
bind=SUPER+CTRL,i,minimized
bind=SUPER+ALT,i,restore_minimized

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER+SHIFT,e,switch_proportion_preset
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
# bind=alt+shift,Left,focusmon,left
# bind=alt+shift,Right,focusmon,right
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right

# gaps
# bind=ALT+SHIFT,X,incgaps,1
# bind=ALT+SHIFT,Z,incgaps,-1
# bind=ALT+SHIFT,R,togglegaps

# movewin
bind=Alt,Up,movewin,+0,-40
bind=Alt,Down,movewin,+0,+40
bind=Alt,Left,movewin,-40,+0
bind=Alt,Right,movewin,+40,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-40
bind=SUPER+ALT,Down,resizewin,+0,+40
bind=SUPER+ALT,Left,resizewin,-40,+0
bind=SUPER+ALT,Right,resizewin,+40,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
# axisbind=SUPER,UP,viewtoleft_have_client
# axisbind=SUPER,DOWN,viewtoright_have_client
#

bindl=NONE,XF86AudioRaiseVolume,spawn, volume --inc
bindl=NONE,XF86AudioLowerVolume,spawn, volume --dec
bindl=NONE,XF86AudioMute,spawn, volume --toggle
# bindl=NONE,XF86MonBrightnessUp,spawn,brightnessctl s 5%+
# bindl=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 5%-
# Requires playerctl
bindl=NONE,XF86AudioNext,spawn,playerctl next
bindl=NONE,XF86AudioPause,spawn,playerctl play-pause
bindl=NONE,XF86AudioPlay,spawn,playerctl play-pause
bindl=NONE,XF86AudioPrev,spawn,playerctl previous
bindl=SUPER,period,spawn,mpc next
bindl=SUPER,comma,spawn, mpc prev
bindl=SUPER,slash,spawn,mpc toggle
# Scratchs Keys
bind=Alt,e,toggle_named_scratchpad,filemanager,none,foot -a filemanager -e yazi
bind=Alt,m,toggle_named_scratchpad,musics,none,foot -a musics -e ncmpcpp
bind=Alt,b,toggle_named_scratchpad,processes,none,foot -a processes -e btop
bind=SUPER,grave,toggle_named_scratchpad,terminal,none,foot -a terminal
bind=NONE,Print,spawn_shell,g=$(slurp -d) && [ -n "$g" ] && grim -g "$g" $HOME/Pictures/Screenshots/$(date +%Y%m%d%H%M%S).png




# Scratchs Rules
windowrule=isnamedscratchpad:1,width:1280,height:800,appid:filemanager
windowrule=isnamedscratchpad:1,width:800,height:600,appid:musics
windowrule=isnamedscratchpad:1,width:900,height:700,appid:processes
windowrule=isnamedscratchpad:1,width:900,height:700,appid:terminal


windowrule=isfloating:1,width:400,height:800,appid:org.telegram.desktop
windowrule=isfloating:1,width:400,height:800,title:Chat
windowrule=isfloating:1,width:800,height:800,appid:floating
# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi


# Autostarts
exec-once=~/.config/mango/autostart
